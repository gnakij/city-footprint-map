<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cityprint/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0066FF" />
    <meta name="description" content="城市足迹地图 - 记录你走过的每一座城市" />
    <title>城市足迹地图</title>
    <style>
      /* 系统字体 — 不依赖 Google Fonts */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
          'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="__loader" style="position:fixed;inset:0;z-index:99998;background:#FCFDFE;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif">
      <div style="display:grid;gap:12px;place-items:center;text-align:center;color:#657386">
        <div style="width:28px;height:28px;border:3px solid #D7E0EC;border-top-color:#166ADF;border-radius:999px;animation:cityprint-spin .8s linear infinite"></div>
        <div style="font-size:14px;font-weight:700">正在加载...</div>
      </div>
    </div>
    <style>@keyframes cityprint-spin{to{transform:rotate(360deg)}}</style>
    <div id="__err" style="display:none;position:fixed;inset:0;z-index:99999;background:#fff;padding:40px 20px;font-size:16px;color:#d00;overflow:auto;white-space:pre-wrap;font-family:monospace;line-height:1.6"></div>
    <script>
      /* 全局错误显示 */
      var _e = document.getElementById('__err');
      var _l = document.getElementById('__loader');
      function _show(msg, detail) {
        _l.style.display = 'none';
        _e.style.display = 'block';
        _e.textContent = msg + '\n\n' + (detail || '');
        document.getElementById('root').style.display = 'none';
      }
      /* React 渲染后隐藏 loader */
      var _ro = new MutationObserver(function() {
        if (document.getElementById('root').children.length > 0) {
          _l.style.display = 'none';
          _ro.disconnect();
        }
      });
      _ro.observe(document.getElementById('root'), { childList: true });
      /* 30s 超时（大 JS 包慢网下需要更久） */
      setTimeout(function() {
        if (_l.style.display !== 'none') {
          _show('加载超时', '页面加载超过30秒，请检查网络连接后刷新重试。\\nUA: ' + navigator.userAgent);
        }
      }, 30000);
      window.addEventListener('error', function(e) {
        var info = [];
        if (e.message) info.push('Message: ' + e.message);
        if (e.filename) info.push('File: ' + e.filename + ':' + e.lineno + ':' + e.colno);
        info.push('UA: ' + navigator.userAgent);
        info.push('Screen: ' + screen.width + 'x' + screen.height);
        _show('JS Error', info.join('\n'));
      });
      window.addEventListener('unhandledrejection', function(e) {
        _show('Promise Error: ' + (e.reason && e.reason.message || e.reason));
      });
      /* localStorage 安全封装 */
      window.__ls = {
        get: function(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
        set: function(k,v) { try { localStorage.setItem(k,v); } catch(e) {} },
        del: function(k) { try { localStorage.removeItem(k); } catch(e) {} }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
